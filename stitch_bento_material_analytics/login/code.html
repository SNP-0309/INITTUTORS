<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Analytics IQ - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#24389c",
                        "inverse-surface": "#2e3132",
                        "surface-container": "#edeeef",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e7e8e9",
                        "secondary-fixed-dim": "#b9c3ff",
                        "on-tertiary-fixed": "#00201c",
                        "surface-dim": "#d9dadb",
                        "outline": "#757684",
                        "on-secondary-fixed": "#021355",
                        "secondary": "#4d5a9c",
                        "on-surface": "#191c1d",
                        "on-primary-fixed-variant": "#293ca0",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e1e3e4",
                        "on-tertiary-container": "#74e5d5",
                        "tertiary-container": "#00665c",
                        "tertiary": "#004c44",
                        "surface-bright": "#f8f9fa",
                        "tertiary-fixed-dim": "#67d9c9",
                        "tertiary-fixed": "#85f6e5",
                        "surface-container-low": "#f3f4f5",
                        "background": "#f8f9fa",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#f0f1f2",
                        "on-secondary-fixed-variant": "#354282",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#005048",
                        "primary-fixed": "#dee0ff",
                        "on-primary-fixed": "#00105c",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-tint": "#4355b9",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#dee1ff",
                        "primary-container": "#3f51b5",
                        "on-secondary-container": "#394687",
                        "surface": "#f8f9fa",
                        "surface-container-highest": "#e1e3e4",
                        "primary-fixed-dim": "#bac3ff",
                        "secondary-container": "#abb7ff",
                        "on-surface-variant": "#454652",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#cacfff",
                        "inverse-primary": "#bac3ff",
                        "on-background": "#191c1d",
                        "outline-variant": "#c5c5d4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "component": "12px",
                        "container": "24px"
                    },
                    "spacing": {
                        "margin-canvas": "16px",
                        "padding-card": "20px",
                        "gutter-bento": "12px"
                    },
                    "fontFamily": {
                        "headline-md-mobile": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-numeric": ["JetBrains Mono"],
                        "title-sm": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-md-mobile": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "display-lg": ["44px", { "lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-numeric": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "title-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .bento-card {
            background-color: theme('colors.surface');
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: theme('borderRadius.container');
            padding: theme('spacing.padding-card');
        }
        .input-field {
            border-radius: theme('borderRadius.component');
            border: 1px solid theme('colors.outline-variant');
            background-color: theme('colors.surface-container-lowest');
            transition: all 0.2s ease;
        }
        .input-field:focus-within {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 1px theme('colors.primary');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md antialiased md:hidden">
<!-- Main Canvas -->
<main class="flex-1 px-margin-canvas py-8 flex flex-col justify-center">
<!-- Header Section -->
<div class="mb-8 text-center flex flex-col items-center">
<div class="w-16 h-16 bg-primary rounded-container flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-primary" style="font-size: 32px; font-variation-settings: 'FILL' 1;">analytics</span>
</div>
<h1 class="font-headline-md-mobile text-headline-md-mobile text-primary mb-2">Analytics IQ</h1>
<p class="text-on-surface-variant">Welcome back. Please sign in to continue.</p>
</div>
<!-- Login Form Bento Card -->
<div class="bento-card mb-6 shadow-sm">
<form class="flex flex-col gap-4">
<!-- Email Input -->
<div class="input-field relative px-4 py-2">
<label class="block text-xs font-medium text-outline mb-1" for="email">Email Address</label>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface placeholder-outline-variant font-body-md text-body-md" id="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password Input -->
<div class="input-field relative px-4 py-2">
<label class="block text-xs font-medium text-outline mb-1" for="password">Password</label>
<div class="flex items-center">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface placeholder-outline-variant font-body-md text-body-md" id="password" placeholder="••••••••" type="password"/>
<button class="text-outline hover:text-primary transition-colors ml-2" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end mt-1 mb-2">
<a class="font-title-sm text-title-sm text-primary hover:text-primary-container transition-colors text-sm" href="#">Forgot Password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary text-on-primary rounded-component py-3 font-title-sm text-title-sm flex items-center justify-center gap-2 active:scale-95 transition-transform duration-150" type="button">
                    Sign In
                    <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
</div>
<!-- Secondary Action -->
<div class="text-center mt-4">
<p class="text-on-surface-variant">
                Don't have an account? 
                <a class="font-title-sm text-title-sm text-primary hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</main>
<!-- Navigation is suppressed as per The "Destination" Rule (Linear/Transactional page) -->
</body></html>
