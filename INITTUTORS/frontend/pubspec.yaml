name: ams_app
description: "Academy Management System — Flutter frontend for coaching institutes."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # HTTP client with interceptors
  dio: ^5.8.0+1

  # State management
  flutter_riverpod: ^2.6.1

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Navigation
  go_router: ^14.8.1

  # Google Fonts (Plus Jakarta Sans + Inter)
  google_fonts: ^6.2.1

  # Date formatting
  intl: ^0.20.2

  # Shared preferences for non-sensitive prefs
  shared_preferences: ^2.5.3

  # Image loading + caching
  cached_network_image: ^3.4.1

  # Skeleton loading
  shimmer: ^3.0.0

  # Pull-to-refresh
  easy_refresh: ^3.4.0

  # Form validation
  reactive_forms: ^17.0.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
